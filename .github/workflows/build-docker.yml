name: Build & Push Dify Docker Images
# 触发条件：1. 手动触发  2. 代码推送到main分支自动触发
on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 开启手动触发按钮（关键）

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 登录 Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1. 构建并推送 API 镜像
      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/dify-api:custom

      # 2. 构建并推送 Web 前端镜像
      - name: Build and push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/dify-web:custom

      # 3. 构建并推送 Worker 异步任务镜像
      - name: Build and push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.worker
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/dify-worker:custom

      # 4. 构建并推送 Websocket 实时通信镜像
      - name: Build and push Websocket
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.websocket
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/dify-websocket:custom
