name: Build & Push Dify Docker Images (修复版)
on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 保留手动触发按钮

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 登录Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1. 构建并推送API镜像（上下文改为根目录，Dockerfile路径不变）
      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: .  # 关键：上下文改为项目根目录，能访问到dify-agent/
          file: ./api/Dockerfile  # Dockerfile路径保持不变
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/dify-api:custom

      # 2. 构建并推送Web前端镜像（同步修改上下文为根目录）
      - name: Build and push Web
        uses: docker/build-push-action@v5
        with:
          context: .  # 上下文改为项目根目录
          file: ./web/Dockerfile  # Dockerfile路径保持不变
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/dify-web:custom
