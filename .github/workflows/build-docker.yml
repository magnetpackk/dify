name: Build & Push Dify Docker Images (新版适配)
on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 保留手动触发按钮

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 登录Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1. 构建并推送API镜像（包含Worker、WebSocket功能）
      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: ./api  # 关键：上下文改为api目录
          file: ./api/Dockerfile  # 新版路径
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/dify-api:custom

      # 2. 构建并推送Web前端镜像
      - name: Build and push Web
        uses: docker/build-push-action@v5
        with:
          context: ./web  # 关键：上下文改为web目录
          file: ./web/Dockerfile  # 新版路径
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/dify-web:custom
